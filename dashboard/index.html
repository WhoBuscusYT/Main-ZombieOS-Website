<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>
ZombieOS - Dashboard
</title>

<link
rel="icon"
type="image/png"
href="/images/favicon.png"
>

<link
rel="stylesheet"
href="/css/global.css?v=6"
>

<link
rel="stylesheet"
href="/css/dashboard.css?v=6"
>

</head>

<body>

<!-- BACKGROUND -->

<div class="background-grid"></div>

<div class="background-glow glow1"></div>
<div class="background-glow glow2"></div>

<!-- NAVBAR -->

<header class="dashboard-navbar">

<div class="dashboard-navbar-top">

<a href="/dashboard/" class="dashboard-logo">
ZOS DASH
</a>

<nav class="dashboard-links">

<a href="/dashboard/profile">

Profile

</a>

<a href="/dashboard/details">

Details

</a>

<a href="/dashboard/settings">

Settings

</a>

</nav>

</div>

</header>

<!-- MAIN -->

<main class="dashboard-main">

<!-- GREETING -->

<section class="dashboard-card dashboard-greeting">

<h1 id="greeting">

Loading...

</h1>

<p>

Welcome back to the ZombieOS ecosystem.

</p>

</section>

<!-- STATS -->

<section class="dashboard-grid">

<!-- PLAYTIME -->

<div class="dashboard-card dashboard-stat-card">

<div class="dashboard-stat-icon">

🎮

</div>

<h2>

Playtime

</h2>

<p id="dashboard-playtime">

No Data Available

</p>

</div>

<!-- ACHIEVEMENTS -->

<div class="dashboard-card dashboard-stat-card">

<div class="dashboard-stat-icon">

🏆

</div>

<h2>

Achievements

</h2>

<p id="dashboard-achievements">

No Data Available

</p>

</div>

<!-- ACCOUNT TYPE -->

<div class="dashboard-card dashboard-stat-card">

<div class="dashboard-stat-icon">

⭐

</div>

<h2>

Account Type

</h2>

<p id="dashboard-subscription">

FREE

</p>

<a
href="/zos-plus"
id="upgrade-button"
class="upgrade-button"
>

Upgrade To ZOS+

</a>

</div>

</section>

<!-- BADGES -->

<section class="dashboard-card">

<h2>

Your Badges

</h2>

<div
id="dashboard-badges"
class="dashboard-empty-state"
>

You have no badges

</div>

</section>

</main>

<!-- FOOTER -->

<footer class="dashboard-footer">

<h2>

ZOS DASH

</h2>

<div class="dashboard-footer-links">

<div class="dashboard-footer-row">

<a
href="/creator"
class="dashboard-footer-button"
>

CREATOR

</a>

<a
href="/dev"
class="dashboard-footer-button"
>

DEV

</a>

<a
href="/zos-plus"
class="dashboard-footer-button zos-plus-footer"
>

ZOS+

</a>

</div>

<div class="dashboard-footer-row">

<a
href="/dashboard/settings"
class="dashboard-footer-button"
>

SETTINGS

</a>

<a
href="/dashboard/details"
class="dashboard-footer-button"
>

DETAILS

</a>

<a
href="/dashboard/profile"
class="dashboard-footer-button"
>

PROFILE

</a>

<a
href="/dashboard/data"
class="dashboard-footer-button"
>

DATA

</a>

</div>

</div>

</footer>

<script
type="module"
src="/js/dashboard.js?v=7">
</script>

</body>
</html>
