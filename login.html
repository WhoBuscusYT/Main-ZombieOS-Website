<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>
Login - ZombieOS
</title>

<link
rel="icon"
type="image/png"
href="favicon.png"
>

<link
rel="stylesheet"
href="css/global.css"
>

<link
rel="stylesheet"
href="css/auth.css"
>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
/>

</head>

<body>

<div class="background-grid"></div>

<div class="background-glow glow1"></div>
<div class="background-glow glow2"></div>

<header class="navbar">

<a
href="/"
class="logo"
>

ZombieOS

</a>

<nav class="nav-links">

<a href="/">
Home
</a>

<a href="/downloads">
Downloads
</a>

<a href="/signup">
Signup
</a>

</nav>

</header>

<main>

<section class="auth-section">

<div class="auth-card floating-card">

<p class="section-eyebrow">

ACCESS RUNTIME

</p>

<h1 class="auth-title">

Login To ZombieOS

</h1>

<p class="auth-description">

Access your runtime identity and dashboard.

</p>

<form
class="auth-form"
id="login-form"
>

<!-- EMAIL -->

<div class="input-group">

<label>
Email
</label>

<input
type="email"
id="login-email"
placeholder="you@example.com"
required
>

</div>

<!-- PASSWORD -->

<div class="input-group">

<label>
Password
</label>

<div class="password-wrapper">

<input
type="password"
id="login-password"
placeholder="Enter password"
required
>

<button
type="button"
class="password-toggle"
id="password-toggle"
>

<i class="fa-solid fa-eye"></i>

</button>

</div>

</div>

<p class="forgot-password-text">

<a href="/forgot-password">

Forgot password?

</a>

</p>

<!-- LOGIN BUTTON -->

<button
type="button"
class="primary-auth-button"
id="login-button"
>

Login

</button>

<!-- DIVIDER -->

<div class="auth-divider">

<span>
OR
</span>

</div>

<!-- GOOGLE -->

<button
type="button"
class="oauth-button google-button"
id="google-login"
>

<i class="fa-brands fa-google"></i>

Continue with Google

</button>

<!-- DISCORD -->

<button
type="button"
class="oauth-button disabled-oauth"
disabled
>

<i class="fa-brands fa-discord"></i>

Discord Coming Soon

</button>

<!-- APPLE -->

<button
type="button"
class="oauth-button disabled-oauth"
disabled
>

<i class="fa-brands fa-apple"></i>

Apple Coming Soon

</button>

<!-- MICROSOFT -->

<button
type="button"
class="oauth-button disabled-oauth"
disabled
>

<i class="fa-brands fa-microsoft"></i>

Microsoft Coming Soon

</button>

<!-- SIGNUP LINK -->

<p class="auth-switch-text">

Don't have an account?

<a href="/signup">

Sign up

</a>

</p>

</form>

</div>

</section>

</main>

<footer>

<h2>

ZombieOS

</h2>

<p>

ZombieOS / ZOS ©
<span id="year"></span>

</p>

</footer>

<script src="js/global.js"></script>

<script
type="module"
src="js/login.js">
</script>

</body>
</html>
