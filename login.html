<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZOS Login</title>
<link rel="stylesheet" href="style.css">
</head>
<body data-auth-page="true">
<div class="bg-grid"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<nav class="navbar">
  <div class="nav-container">
    <a href="index.html" class="logo">ZOS</a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="downloads.html">Downloads</a>
      <a href="status.html">Status</a>
      <a href="signup.html">Sign Up</a>
    </div>
  </div>
</nav>

<section class="auth-page">
  <div class="auth-card">
    <p class="section-tag">ACCOUNT SYSTEM</p>
    <h1 class="page-title">Login</h1>

    <div data-message class="message"></div>

    <form id="login-form" class="auth-form">
      <input id="login-email" class="input" type="email" placeholder="Email" required>
      <input id="login-password" class="input" type="password" placeholder="Password" required>
      <button class="btn" type="submit">Login</button>
    </form>

    <div class="auth-divider">OR</div>

    <button class="oauth-btn" data-google-auth>
      <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg" alt="">
      Continue with Google
    </button>

    <button class="oauth-btn" data-discord-soon>
      Continue with Discord
    </button>

    <p class="auth-link">Don't have an account? <a href="signup.html">Create one</a></p>
  </div>
</section>
<footer class="footer"><div class="footer-logo">ZombieOS</div><div class="footer-grid">
<a href="index.html" class="footer-btn">Home</a>
<a href="zsharp.html" class="footer-btn">Z#</a>
<a href="downloads.html" class="footer-btn">Downloads</a>
<a href="versions.html" class="footer-btn">Versions</a>
<a href="status.html" class="footer-btn">Status</a>
<a href="devlog.html" class="footer-btn">Devlog</a>
<a href="docs.html" class="footer-btn">Docs</a>
<a href="community.html" class="footer-btn">Community</a>
</div><p class="footer-copy">© <span id="year"></span> ZombieOS</p></footer>
<script type="module" src="script.js"></script>
</body>
</html>
