<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZOS Login</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-grid"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<nav class="navbar">
<div class="nav-container">

<a href="index.html" class="logo">
ZOS
</a>

<div class="nav-links">
<a href="index.html">Home</a>
<a href="downloads.html">Downloads</a>
<a href="status.html">Status</a>
<a href="signup.html">Sign Up</a>
</div>

</div>
</nav>

<div class="page auth-container">

<div class="section-tag">
ACCOUNT SYSTEM
</div>

<h1 class="page-title">
Login
</h1>

<div class="card">

<div class="input-group">
<input
type="email"
id="login-email"
class="input"
placeholder="Email">
</div>

<div class="input-group">
<input
type="password"
id="login-password"
class="input"
placeholder="Password">
</div>

<button id="login-btn" class="btn">
Login
</button>

<div class="auth-divider">
OR
</div>

<button id="google-login" class="google-btn">

<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg">

Continue with Google

</button>

<a
href="#"
class="discord-btn">

<img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/discord.svg">

Continue with Discord

</a>

<div class="auth-link">
Don't have an account?
<a href="signup.html">
Create one
</a>
</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
GoogleAuthProvider,
signInWithPopup
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyDG0hSabeqYdGgSISOgvSnkOwATXDLiV9g",
authDomain: "zombieos.firebaseapp.com",
projectId: "zombieos",
storageBucket: "zombieos.firebasestorage.app",
messagingSenderId: "577624378484",
appId: "1:577624378484:web:3e88e693724bde8e89d521",
measurementId: "G-LV0T97LGWP"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

/* EMAIL LOGIN */

document.getElementById("login-btn")
.addEventListener("click", async () => {

const email =
document.getElementById("login-email").value;

const password =
document.getElementById("login-password").value;

try{

await signInWithEmailAndPassword(
auth,
email,
password
);

window.location.href =
"dashboard/index.html";

}catch(error){

alert(error.message);

}

});

/* GOOGLE LOGIN */

document.getElementById("google-login")
.addEventListener("click", async () => {

const provider =
new GoogleAuthProvider();

try{

await signInWithPopup(
auth,
provider
);

window.location.href =
"dashboard/index.html";

}catch(error){

alert(error.message);

}

});

</script>

</body>
</html>
