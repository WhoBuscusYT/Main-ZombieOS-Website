<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZOS Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyDG0hSabeqYdGgSISOgvSnkOwATXDLiV9g",

authDomain: "zombieos.firebaseapp.com",

projectId: "zombieos",

storageBucket: "zombieos.firebasestorage.app",

messagingSenderId: "577624378484",

appId: "1:577624378484:web:3e88e693724bde8e89d521",

measurementId: "G-LV0T97LGWP"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

window.addEventListener("DOMContentLoaded", () => {

const form =
document.getElementById("login-form");

form.addEventListener("submit", async (e) => {

e.preventDefault();

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

try {

await signInWithEmailAndPassword(
auth,
email,
password
);

window.location.href =
"dashboard.html";

} catch(error){

alert(
"Invalid email or password."
);

}

});

});

</script>

</head>

<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<nav class="navbar">

<div class="nav-container">

<a href="index.html" class="logo">
ZOS
</a>

<div class="nav-links">

<a href="index.html">Home</a>

<a href="signup.html">
Sign Up
</a>

</div>

</div>

</nav>

<section class="section auth-section">

<div class="auth-card">

<div class="section-top">
ACCOUNT ACCESS
</div>

<h1 class="section-title">
Login
</h1>

<form id="login-form" class="auth-form">

<input
type="email"
id="email"
placeholder="Email"
required
>

<input
type="password"
id="password"
placeholder="Password"
required
>

<button
type="submit"
class="primary-btn"
>

Login

</button>

</form>

</div>

</section>

</body>

</html>
