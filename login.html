<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>

ZombieOS - Login

</title>

<link
rel="icon"
type="image/png"
href="/favicon.png"
>

<link
rel="stylesheet"
href="/css/global.css?v=3"
>

<link
rel="stylesheet"
href="/css/auth.css?v=3"
>

</head>

<body>

<div class="background-grid"></div>

<div class="background-glow glow1"></div>
<div class="background-glow glow2"></div>

<main class="auth-container">

<div class="auth-card">

<h1>

Login

</h1>

<p class="auth-subtitle">

Access the ZombieOS ecosystem.

</p>

<form
id="login-form"
class="auth-form"
>

<input
type="email"
id="email"
placeholder="Email"
required
>

<input
type="password"
id="password"
placeholder="Password"
required
>

<a
href="/forgot-password"
class="auth-link"
>

Forgot Password?

</a>

<button
type="submit"
class="auth-button"
>

Login

</button>

</form>

<div class="auth-divider">

<span>

OR

</span>

</div>

<div class="social-auths">

<button
id="google-login"
class="social-button"
>

<img
src="/images/icons/google.png"
alt="Google"
>

<span>

Google

</span>

</button>

<button
class="social-button disabled-button"
disabled
>

<img
src="/images/icons/discord.png"
alt="Discord"
>

<span>

Discord

</span>

</button>

<button
class="social-button disabled-button"
disabled
>

<img
src="/images/icons/apple.png"
alt="Apple"
>

<span>

Apple

</span>

</button>

<button
class="social-button disabled-button"
disabled
>

<img
src="/images/icons/microsoft.png"
alt="Microsoft"
>

<span>

Microsoft

</span>

</button>

</div>

<p class="auth-footer">

Don't have an account?

<a href="/signup">

Sign Up

</a>

</p>

</div>

</main>

<!-- NAVBAR -->

<header class="navbar">

<div class="nav-left">

<a
href="/"
class="logo"
>

ZombieOS

</a>

</div>

<nav class="nav-links">

<a href="/">

Home

</a>

<a href="/downloads">

Downloads

</a>

<a href="/docs">

Docs

</a>

<a href="/community">

Community

</a>

</nav>

</header>

<script
type="module"
src="/js/login.js?v=3"
></script>

</body>
</html>
