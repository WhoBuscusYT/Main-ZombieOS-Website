<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>
Forgot Password - ZombieOS
</title>

<link
rel="icon"
type="image/png"
href="/images/favicon.png"
>

<link
rel="stylesheet"
href="/css/global.css"
>

<link
rel="stylesheet"
href="/css/auth.css"
>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
/>

</head>

<body>

<div class="background-grid"></div>

<div class="background-glow glow1"></div>
<div class="background-glow glow2"></div>

<header class="navbar">

<a
href="/"
class="logo"
>

ZombieOS

</a>

<nav class="nav-links">

<a href="/">
Home
</a>

<a href="/downloads">
Downloads
</a>

<a
id="navbar-login-button"
href="/login"
class="nav-button"
>

Login

</a>

</nav>

</header>

<main>

<section class="auth-section">

<div class="auth-card floating-card">

<p class="section-eyebrow">

ACCOUNT RECOVERY

</p>

<h1 class="auth-title">

Reset Password

</h1>

<p class="auth-description">

Enter your email and we'll send you a password reset link.

</p>

<form
class="auth-form"
id="forgot-password-form"
>

<!-- EMAIL -->

<div class="input-group">

<label>
Email
</label>

<input
type="email"
id="reset-email"
placeholder="you@example.com"
required
>

</div>

<!-- BUTTON -->

<button
type="button"
class="primary-auth-button"
id="reset-password-button"
>

Send Reset Link

</button>

<!-- LOGIN LINK -->

<p class="auth-switch-text">

Remembered your password?

<a href="/login">

Login

</a>

</p>

</form>

</div>

</section>

</main>

<footer>

<h2>

ZombieOS

</h2>

<p>

ZombieOS / ZOS ©
<span id="year"></span>

</p>

</footer>

<script src="/js/global.js"></script>

<script
type="module"
src="/js/forgot-password.js">
</script>

</body>
</html>
