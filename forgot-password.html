<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password - ZombieOS</title>

<link rel="icon" type="image/png" href="/images/favicon.png">

<link rel="stylesheet" href="/css/global.css" >

<link rel="stylesheet" href="/css/auth.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

</head>

<body>

<div class="background-grid"></div>
<div class="background-glow glow1"></div>
<div class="background-glow glow2"></div>

<header class="navbar">

<div class="navbar-top">

<a href="/" class="logo">ZombieOS</a>

<div class="navbar-account">
    <a id="navbar-login-button" href="/login" class="nav-button">Login</a>
</div>

<button id="navbar-toggle">☰ Menu</button>

</div>

<nav class="nav-links" id="nav-links">

<a href="/">Home</a>
<a href="/zsharp">Z#</a>
<a href="/downloads">Downloads</a>
<a href="/versions">Versions</a>
<a href="/status">Status</a>
<a href="/devlog">Devlog</a>
<a href="/docs">Docs</a>
<a href="/community">Community</a>
<a href="/tickets">Support</a>

</nav>

</header>

<main>

<section class="auth-section">

<div class="auth-card floating-card">

<p class="section-eyebrow">ACCOUNT RECOVERY</p>

<h1 class="auth-title">Reset Password</h1>

<p class="auth-description">Enter your email and we'll send you a password reset link.</p>

<form class="auth-form" id="forgot-password-form">

<div class="input-group">

<label>Email</label>

<input type="email" id="reset-email" placeholder="you@example.com" required>

</div>

<button type="button" class="primary-auth-button" id="reset-password-button">Send Reset Link</button>

<p class="auth-switch-text">Remembered your password?<a href="/login">Login</a></p>

</form>

</div>

</section>

</main>

<footer class="footer">

<h2>ZombieOS</h2>

<div class="footer-links">
<a href="/">Home</a>
<a href="/downloads">Downloads</a>
<a href="/versions">Versions</a>
<a href="/status">Status</a>
</div>

<p>ZombieOS / ZOS © <span id="year"></span></p>

</footer>

<div id="popup-overlay" class="popup-overlay">

    <div class="popup-box">

        <h2 id="popup-title">
            Popup Title
        </h2>

        <p id="popup-message">
            Popup Message
        </p>

        <div class="popup-buttons">

            <button
                id="popup-confirm"
                class="popup-confirm"
            >
                OK
            </button>

            <button
                id="popup-cancel"
                class="popup-cancel"
            >
                Cancel
            </button>

        </div>

    </div>

</div>

<script type="module" src="/js/global.js"></script>

<script type="module" src="/js/forgot-password.js"></script>

</body>
</html>
