<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Create Account</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="background-grid"></div>

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<nav class="navbar">

<a href="index.html" class="logo">
ZOS
</a>

<div class="nav-links">

<a href="index.html">Home</a>
<a href="downloads.html">Downloads</a>
<a href="status.html">Status</a>
<a href="login.html">Login</a>

</div>

</nav>

<section class="auth-section">

<p class="section-tag">
CREATE ACCOUNT
</p>

<h1 class="hero-title">
Sign Up
</h1>

<div class="auth-card">

<input
type="text"
id="signup-username"
class="zos-input"
placeholder="Username"
>

<input
type="email"
id="signup-email"
class="zos-input"
placeholder="Email"
>

<input
type="password"
id="signup-password"
class="zos-input"
placeholder="Password"
>

<button
id="signup-btn"
class="primary-btn">

Create Account

</button>

<p class="auth-switch">

Already have an account?

<a href="login.html">
Login
</a>

</p>

</div>

</section>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

import {
getFirestore,
doc,
setDoc
}
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyDG0hSabeqYdGgSISOgvSnkOwATXDLiV9g",

authDomain: "zombieos.firebaseapp.com",

projectId: "zombieos",

storageBucket: "zombieos.firebasestorage.app",

messagingSenderId: "577624378484",

appId: "1:577624378484:web:3e88e693724bde8e89d521",

measurementId: "G-LV0T97LGWP"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

const db =
getFirestore(app);

document.getElementById("signup-btn")
.addEventListener("click", async () => {

const username =
document.getElementById("signup-username").value;

const email =
document.getElementById("signup-email").value;

const password =
document.getElementById("signup-password").value;

try {

const userCredential =
await createUserWithEmailAndPassword(
auth,
email,
password
);

const user =
userCredential.user;

await setDoc(
doc(db, "users", user.uid),
{
username: username,
email: email,
createdAt: Date.now()
}
);

window.location.href =
"dashboard.html";

}

catch(error) {

alert(error.message);

}

});

</script>

</body>
</html>
