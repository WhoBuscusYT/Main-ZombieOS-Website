<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create ZOS Account</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;800&display=swap" rel="stylesheet">

</head>

<body>

<div class="background-grid"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<nav class="navbar">

<div class="nav-container">

<a href="index.html" class="logo">ZOS</a>

<div class="nav-links">

<a href="index.html">Home</a>
<a href="downloads.html">Downloads</a>
<a href="status.html">Status</a>
<a href="login.html">Login</a>

</div>

</div>

</nav>

<section class="auth-page">

<div class="auth-card">

<p class="section-tag">
CREATE ACCOUNT
</p>

<h1 class="auth-title">
Sign Up
</h1>

<input
type="text"
id="signup-username"
class="zos-input"
placeholder="Username"
>

<input
type="email"
id="signup-email"
class="zos-input"
placeholder="Email"
>

<input
type="password"
id="signup-password"
class="zos-input"
placeholder="Password"
>

<button
id="signup-btn"
class="primary-btn">
Create Account
</button>

<button
id="google-signup"
class="oauth-btn">
<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg">
Continue with Google
</button>

<p class="auth-switch">
Already have an account?
<a href="login.html">Login</a>
</p>

</div>

</section>

<script type="module">

import { auth, db, googleProvider }
from "./firebase.js";

import {
createUserWithEmailAndPassword,
signInWithPopup
}
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

import {
doc,
setDoc,
getDoc
}
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

document.getElementById("signup-btn")
.addEventListener("click", async () => {

const username =
document.getElementById("signup-username")
.value
.trim()
.toLowerCase();

const email =
document.getElementById("signup-email").value;

const password =
document.getElementById("signup-password").value;

if(!username || !email || !password){

alert("Fill out all fields.");

return;
}

try {

const usernameRef =
doc(db, "usernames", username);

const usernameSnap =
await getDoc(usernameRef);

if(usernameSnap.exists()){

alert("Username already exists. Use a different username.");

return;
}

const userCredential =
await createUserWithEmailAndPassword(
auth,
email,
password
);

const user =
userCredential.user;

await setDoc(
doc(db, "users", user.uid),
{
username: username,
email: email,
handle: username,
bio: "",
profilePublic: false,
photoURL: "",
createdAt: Date.now()
}
);

await setDoc(
usernameRef,
{
uid: user.uid
}
);

window.location.href =
"dashboard/index.html";

} catch(error) {

if(error.code === "auth/email-already-in-use"){

alert("Email already exists. Use a different email or login.");

} else {

alert(error.message);

}

}

});

document.getElementById("google-signup")
.addEventListener("click", async () => {

try {

const result =
await signInWithPopup(
auth,
googleProvider
);

const user =
result.user;

await setDoc(
doc(db, "users", user.uid),
{
username: user.displayName || "ZOS User",
email: user.email,
handle: "",
bio: "",
profilePublic: false,
photoURL: user.photoURL || "",
createdAt: Date.now()
},
{
merge: true
}
);

window.location.href =
"dashboard/index.html";

} catch(error) {

alert(error.message);

}

});

</script>

</body>
</html>
