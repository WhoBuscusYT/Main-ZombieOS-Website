<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZOS Sign Up</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-grid"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<nav class="navbar">
<div class="nav-container">

<a href="index.html" class="logo">
ZOS
</a>

<div class="nav-links">
<a href="index.html">Home</a>
<a href="downloads.html">Downloads</a>
<a href="status.html">Status</a>
<a href="login.html">Login</a>
</div>

</div>
</nav>

<div class="page auth-container">

<div class="section-tag">
CREATE ACCOUNT
</div>

<h1 class="page-title">
Sign Up
</h1>

<div class="card">

<div class="input-group">
<input
type="text"
id="signup-username"
class="input"
placeholder="Username">
</div>

<div class="input-group">
<input
type="email"
id="signup-email"
class="input"
placeholder="Email">
</div>

<div class="input-group">
<input
type="password"
id="signup-password"
class="input"
placeholder="Password">
</div>

<button id="signup-btn" class="btn">
Create Account
</button>

<div class="auth-divider">
OR
</div>

<button id="google-signup" class="google-btn">

<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg">

Continue with Google

</button>

<a
href="#"
class="discord-btn">

<img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/discord.svg">

Continue with Discord

</a>

<div class="auth-link">
Already have an account?
<a href="login.html">
Login
</a>
</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
GoogleAuthProvider,
signInWithPopup
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyDG0hSabeqYdGgSISOgvSnkOwATXDLiV9g",
authDomain: "zombieos.firebaseapp.com",
projectId: "zombieos",
storageBucket: "zombieos.firebasestorage.app",
messagingSenderId: "577624378484",
appId: "1:577624378484:web:3e88e693724bde8e89d521",
measurementId: "G-LV0T97LGWP"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

/* EMAIL SIGNUP */

document.getElementById("signup-btn")
.addEventListener("click", async () => {

const email =
document.getElementById("signup-email").value;

const password =
document.getElementById("signup-password").value;

try{

await createUserWithEmailAndPassword(
auth,
email,
password
);

window.location.href =
"dashboard/index.html";

}catch(error){

alert(error.message);

}

});

/* GOOGLE SIGNUP */

document.getElementById("google-signup")
.addEventListener("click", async () => {

const provider =
new GoogleAuthProvider();

try{

await signInWithPopup(
auth,
provider
);

window.location.href =
"dashboard/index.html";

}catch(error){

alert(error.message);

}

});

</script>

</body>
</html>
