<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>

ZombieOS - Sign Up

</title>

<link
rel="icon"
type="image/png"
href="/favicon.png"
>

<link
rel="stylesheet"
href="/css/global.css?v=3"
>

<link
rel="stylesheet"
href="/css/auth.css?v=3"
>

</head>

<body>

<div class="background-grid"></div>

<div class="background-glow glow1"></div>
<div class="background-glow glow2"></div>

<main class="auth-container">

<div class="auth-card">

<h1>

Create Account

</h1>

<p class="auth-subtitle">

Join the ZombieOS ecosystem.

</p>

<form
id="signup-form"
class="auth-form"
>

<input
type="text"
id="username"
placeholder="Username"
required
>

<input
type="email"
id="email"
placeholder="Email"
required
>

<input
type="password"
id="password"
placeholder="Password"
required
>

<button
type="submit"
class="auth-button"
>

Create Account

</button>

</form>

<div class="auth-divider">

<span>

OR

</span>

</div>

<div class="social-auths">

<button
id="google-signup"
class="social-button"
>

Google

</button>

<button
class="social-button disabled-button"
disabled
>

Discord

</button>

<button
class="social-button disabled-button"
disabled
>

Apple

</button>

<button
class="social-button disabled-button"
disabled
>

Microsoft

</button>

</div>

<p class="auth-footer">

Already have an account?

<a href="/login">

Login

</a>

</p>

</div>

</main>

<script
type="module"
src="/js/auth.js?v=3"
></script>

</body>
</html>
