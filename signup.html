<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>
Signup - ZombieOS
</title>

<link
rel="icon"
type="image/png"
href="favicon.png"
>

<link
rel="stylesheet"
href="css/global.css"
>

<link
rel="stylesheet"
href="css/auth.css"
>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
/>

<!-- FIREBASE -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
sendEmailVerification,
GoogleAuthProvider,
signInWithRedirect
}
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

const firebaseConfig = {

apiKey:
"AIzaSyDG0hSabeqYdGgSISOgvSnkOwATXDLiV9g",

authDomain:
"zombieos.firebaseapp.com",

projectId:
"zombieos",

storageBucket:
"zombieos.firebasestorage.app",

messagingSenderId:
"577624378484",

appId:
"1:577624378484:web:3e88e693724bde8e89d521",

measurementId:
"G-LV0T97LGWP"

};

const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

window.firebaseAuth =
auth;

window.createUserWithEmailAndPassword =
createUserWithEmailAndPassword;

window.sendEmailVerification =
sendEmailVerification;

window.GoogleAuthProvider =
GoogleAuthProvider;

window.signInWithRedirect =
signInWithRedirect;

</script>

</head>

<body>

<div class="background-grid"></div>

<div class="background-glow glow1"></div>
<div class="background-glow glow2"></div>

<header class="navbar">

<a
href="/"
class="logo"
>

ZombieOS

</a>

<nav class="nav-links">

<a href="/">
Home
</a>

<a href="/downloads">
Downloads
</a>

<a href="/login">
Login
</a>

</nav>

</header>

<main>

<section class="auth-section">

<div class="auth-card floating-card">

<p class="section-eyebrow">

INITIALIZE IDENTITY

</p>

<h1 class="auth-title">

Create Runtime Account

</h1>

<p class="auth-description">

Connect to the ZombieOS ecosystem.

</p>

<form
class="auth-form"
id="signup-form"
>

<!-- USERNAME -->

<div class="input-group">

<label>
Username
</label>

<input
type="text"
id="signup-username"
placeholder="ZombieOS Developer"
required
>

</div>

<!-- EMAIL -->

<div class="input-group">

<label>
Email
</label>

<input
type="email"
id="signup-email"
placeholder="you@example.com"
required
>

</div>

<!-- PASSWORD -->

<div class="input-group">

<label>
Password
</label>

<div class="password-wrapper">

<input
type="password"
id="signup-password"
placeholder="Enter password"
required
>

<button
type="button"
class="password-toggle"
onclick="togglePassword()"
>

<i class="fa-solid fa-eye"></i>

</button>

</div>

</div>

<!-- CONFIRM PASSWORD -->

<div class="input-group">

<label>
Confirm Password
</label>

<div class="password-wrapper">

<input
type="password"
id="confirm-password-input"
placeholder="Confirm password"
required
>

<button
type="button"
class="password-toggle"
onclick="toggleConfirmPassword()"
>

<i class="fa-solid fa-eye"></i>

</button>

</div>

<p
id="password-status"
class="input-status"
>

Passwords must match.

</p>

</div>

<!-- BUTTON -->

<button
type="button"
class="primary-auth-button"
id="create-account-button"
>

Create Account

</button>

<!-- GOOGLE -->

<button
type="button"
class="oauth-button google-button"
id="google-signup"
>

<i class="fa-brands fa-google"></i>

Continue with Google

</button>

<!-- DISCORD -->

<button
type="button"
class="oauth-button discord-button"
disabled
>

<i class="fa-brands fa-discord"></i>

Discord Auth Coming Soon

</button>

</form>

</div>

</section>

</main>

<footer>

<h2>
ZombieOS
</h2>

<p>

ZombieOS / ZOS ©
<span id="year"></span>

</p>

</footer>

<script src="js/global.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
