<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>
Signup - ZombieOS
</title>

<link
rel="icon"
type="image/png"
href="favicon.png"
>

<link
rel="stylesheet"
href="css/global.css"
>

<link
rel="stylesheet"
href="css/auth.css"
>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
/>

</head>

<body>

<!-- BACKGROUND -->

<div class="background-grid"></div>

<div class="background-glow glow1"></div>
<div class="background-glow glow2"></div>

<!-- NAVBAR -->

<header class="navbar">

<a
href="/"
class="logo"
>

ZombieOS

</a>

<nav class="nav-links">

<a href="/">
Home
</a>

<a href="/downloads">
Downloads
</a>

<a href="/login">
Login
</a>

</nav>

</header>

<!-- MAIN -->

<main>

<section class="auth-section">

<div class="auth-card floating-card">

<p class="section-eyebrow">

INITIALIZE IDENTITY

</p>

<h1 class="auth-title">

Create Runtime Account

</h1>

<p class="auth-description">

Connect to the ZombieOS ecosystem.

</p>

<form
class="auth-form"
id="signup-form"
>

<!-- USERNAME -->

<div class="input-group">

<label>
Username
</label>

<input
type="text"
id="signup-username"
placeholder="ZombieOS Developer"
required
>

</div>

<!-- EMAIL -->

<div class="input-group">

<label>
Email
</label>

<input
type="email"
id="signup-email"
placeholder="you@example.com"
required
>

</div>

<!-- PASSWORD -->

<div class="input-group">

<label>
Password
</label>

<div class="password-wrapper">

<input
type="password"
id="signup-password"
placeholder="Enter password"
required
>

<button
type="button"
class="password-toggle"
onclick="togglePassword()"
>

<i class="fa-solid fa-eye"></i>

</button>

</div>

</div>

<!-- CREATE ACCOUNT -->

<button
type="button"
class="primary-auth-button"
id="create-account-button"
>

Create Account

</button>

<!-- DIVIDER -->

<div class="auth-divider">

<span>
OR
</span>

</div>

<!-- GOOGLE -->

<button
type="button"
class="oauth-button google-button"
id="google-signup"
>

<i class="fa-brands fa-google"></i>

Continue with Google

</button>

<!-- DISCORD -->

<button
type="button"
class="oauth-button disabled-oauth"
disabled
>

<i class="fa-brands fa-discord"></i>

Discord Coming Soon

</button>

<!-- APPLE -->

<button
type="button"
class="oauth-button disabled-oauth"
disabled
>

<i class="fa-brands fa-apple"></i>

Apple Coming Soon

</button>

<!-- MICROSOFT -->

<button
type="button"
class="oauth-button disabled-oauth"
disabled
>

<i class="fa-brands fa-microsoft"></i>

Microsoft Coming Soon

</button>

<!-- LOGIN LINK -->

<p class="auth-switch-text">

Already have an account?

<a href="/login">

Login

</a>

</p>

</form>

</div>

</section>

</main>

<!-- FOOTER -->

<footer>

<h2>

ZombieOS

</h2>

<p>

ZombieOS / ZOS ©
<span id="year"></span>

</p>

</footer>

<!-- SCRIPTS -->

<script src="js/global.js"></script>

<script
type="module"
src="js/auth.js">
</script>

</body>
</html>
